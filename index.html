<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #0b0f1a, #111827, #1a1f35, #0b0f1a);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
  color: white;
}

/* animated background */
@keyframes bg {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

/* center layout */
.center-box {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

/* floating image */
.hero img {
  width: 160px;
  border-radius: 50%;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
  box-shadow: 0 0 25px rgba(255,215,0,0.5);
}

@keyframes float {
  0%,100% {transform: translateY(0)}
  50% {transform: translateY(-12px)}
}

h1 {
  color: gold;
  margin-bottom: 10px;
}

/* timer */
.timer {
  font-size: 26px;
  margin: 15px 0;
  color: #ff4d4d;
}

/* button */
.cta-btn {
  padding: 18px 30px;
  font-size: 20px;
  border-radius: 12px;
  background: linear-gradient(90deg,#ffd700,#ffb300);
  color: #000;
  font-weight: bold;
  text-decoration: none;
  opacity: 0.5;
  pointer-events: none;
  transition: 0.3s;
}

/* active button */
.cta-btn.active {
  opacity: 1;
  pointer-events: auto;
  box-shadow: 0 0 20px gold;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {box-shadow: 0 0 10px gold}
  50% {box-shadow: 0 0 25px gold}
  100% {box-shadow: 0 0 10px gold}
}

.footer {
  font-size: 12px;
  color: #aaa;
  margin-top: 25px;
}
</style>

<body>

<div class="center-box">

  <div class="hero">
    <img src="trader.jpg" alt="Trader Image">
  </div>

  <h1>TRADER PIHU (ORIGINAL)</h1>

  <div class="timer" id="timer">⏳ Wait 30 sec...</div>

<a href="https://t.me/+iRuG8yBIQI80NDZl"
  id="joinBtn"
  class="cta-btn"
  onclick="joinNow()">
🚀 JOIN FREE TELEGRAM CHANNEL </a>

  <div class="footer">
    ⚠️ Limited access • Join fast before market opens
  </div>

</div>

<script>
// countdown
let timeLeft = 30;
let timerEl = document.getElementById("timer");
let btn = document.getElementById("joinBtn");

let countdown = setInterval(() => {
  timeLeft--;
  timerEl.innerText = "⏳ Wait " + timeLeft + " sec...";

  if(timeLeft <= 0){
    clearInterval(countdown);
    timerEl.innerText = "✅ Now You Can Join!";
    btn.classList.add("active");
  }
}, 1000);

// tracking
function joinNow(){
  fbq('track','Lead');
  fbq('track','Subscribe');
  fbq('trackCustom','TelegramJoin');
}
</script>
